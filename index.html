<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FinanceFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4 font-sans">

<div id="authApp" class="w-full max-w-md bg-white rounded-3xl shadow-2xl p-8 relative overflow-hidden">
    
    <!-- Animasi Notifikasi -->
    <div v-if="notif.show" :class="notif.type === 'success' ? 'bg-emerald-500' : 'bg-rose-500'" class="absolute top-0 left-0 w-full text-white text-xs font-bold text-center py-2 transition-all">
        {{ notif.message }}
    </div>

    <div class="text-center mt-4 mb-8">
        <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4 shadow-inner">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
        </div>
        <h1 class="text-2xl font-extrabold text-slate-800">FinanceFlow <span class="text-blue-600">Pro</span></h1>
        <p class="text-sm text-slate-500 mt-1">{{ mode === 'login' ? 'Masuk ke portal manajemen finansial Anda.' : 'Pemulihan Kredensial' }}</p>
    </div>

    <!-- FORM LOGIN -->
    <form v-if="mode === 'login'" @submit.prevent="doLogin" class="space-y-4">
        <div>
            <label class="text-[10px] uppercase font-bold text-slate-400 ml-1">Username</label>
            <input type="text" v-model="formLogin.username" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        <div>
            <label class="text-[10px] uppercase font-bold text-slate-400 ml-1">Password</label>
            <input type="password" v-model="formLogin.password" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        <button type="submit" :disabled="isLoading" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg flex justify-center mt-2">
            {{ isLoading ? 'Memverifikasi...' : 'Masuk Ke Sistem' }}
        </button>
        <div class="text-center mt-4">
            <button type="button" @click="mode = 'forgot'" class="text-xs text-blue-600 font-bold hover:underline">Lupa Password?</button>
        </div>
    </form>

    <!-- FORM LUPA PASSWORD -->
    <form v-if="mode === 'forgot'" @submit.prevent="doReset" class="space-y-4">
        <div>
            <label class="text-[10px] uppercase font-bold text-slate-400 ml-1">Email Terdaftar</label>
            <input type="email" v-model="formReset.email" required placeholder="email@anda.com" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        <button type="submit" :disabled="isLoading" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-4 rounded-xl transition-all shadow-lg flex justify-center">
            {{ isLoading ? 'Mengirim Email...' : 'Kirim Ulang Password' }}
        </button>
        <div class="text-center mt-4">
            <button type="button" @click="mode = 'login'" class="text-xs text-slate-500 font-bold hover:text-slate-800">Kembali ke Login</button>
        </div>
    </form>
</div>

<script>
const { createApp, ref, onMounted } = Vue;

createApp({
    setup() {
        const API_URL = "https://script.google.com/macros/s/AKfycbxn8tiMuUue4ghyMx-YZgo1iaPsuSAc8IAHuO9htx63Pwux04AX7a6yqV2BJOXP_q26qg/exec"; // WAJIB GANTI
        
        const mode = ref('login'); // 'login' or 'forgot'
        const isLoading = ref(false);
        const formLogin = ref({ username: '', password: '' });
        const formReset = ref({ email: '' });
        const notif = ref({ show: false, message: '', type: 'success' });

        const showNotif = (msg, type) => {
            notif.value = { show: true, message: msg, type: type };
            setTimeout(() => { notif.value.show = false; }, 3000);
        };

        // Otomatis pindah ke dashboard jika sudah login sebelumnya
        onMounted(() => {
            if(localStorage.getItem('ff_token')) window.location.href = 'dashboard.html';
        });

        const doLogin = async () => {
            isLoading.value = true;
            try {
                const res = await fetch(API_URL, {
                    method: 'POST', body: JSON.stringify({ action: 'login', ...formLogin.value })
                });
                const response = await res.json();
                if (response.status === 'success') {
                    // Simpan Token Kunci
                    localStorage.setItem('ff_token', response.token);
                    // Pindah ke file HTML Dashboard
                    window.location.href = 'dashboard.html'; 
                } else {
                    showNotif(response.message, 'error');
                }
            } catch (e) {
                showNotif("Gagal terhubung ke server.", 'error');
            } finally { isLoading.value = false; }
        };

        const doReset = async () => {
            isLoading.value = true;
            try {
                const res = await fetch(API_URL, {
                    method: 'POST', body: JSON.stringify({ action: 'forgot_password', email: formReset.value.email })
                });
                const response = await res.json();
                if (response.status === 'success') {
                    showNotif(response.message, 'success');
                    formReset.value.email = '';
                    setTimeout(() => { mode.value = 'login'; }, 2000);
                } else {
                    showNotif(response.message, 'error');
                }
            } catch (e) {
                showNotif("Gagal terhubung ke server.", 'error');
            } finally { isLoading.value = false; }
        };

        return { mode, isLoading, formLogin, formReset, doLogin, doReset, notif };
    }
}).mount('#authApp');
</script>
</body>
</html>
